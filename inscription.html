<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — Les bons contacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/legal.css">
</head>
<body class="page-auth">
  <div class="page">
    <header class="header">
      <a href="index.html" class="logo">
        <span class="logo__icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="#E8341A"/>
            <path d="M7 16V8h2.2l2.3 4.5L14 8h2v8h-1.8v-4.8L12.2 16h-1.4L9 11.2V16H7z" fill="white"/>
          </svg>
        </span>
        <span class="logo__name">Les bons contacts</span>
      </a>

      <nav class="nav">
        <a href="ebook.html" class="nav__link">Ebook</a>
        <a href="connexion.html" class="nav__link">Connexion</a>
        <a href="inscription.html" class="nav__link nav__link--active">Inscription</a>
      </nav>
    </header>

    <main class="auth">
      <div class="auth__card">
        <h1 class="auth__title">Inscription</h1>
        <p class="auth__subtitle">Créez votre compte en quelques secondes.</p>

        <form class="auth__form" id="register-form" novalidate>
          <div class="auth__field">
            <label class="auth__label" for="register-name">Nom complet</label>
            <input class="auth__input" type="text" id="register-name" name="name" placeholder="Jean Dupont" autocomplete="name" required>
          </div>

          <div class="auth__field">
            <label class="auth__label" for="register-email">Adresse e-mail</label>
            <input class="auth__input" type="email" id="register-email" name="email" placeholder="vous@exemple.com" autocomplete="email" required>
          </div>

          <div class="auth__field">
            <label class="auth__label" for="register-password">Mot de passe</label>
            <input class="auth__input" type="password" id="register-password" name="password" placeholder="8 caractères minimum" autocomplete="new-password" minlength="8" required>
          </div>

          <div class="auth__field">
            <label class="auth__label" for="register-confirm">Confirmer le mot de passe</label>
            <input class="auth__input" type="password" id="register-confirm" name="confirm" placeholder="••••••••" autocomplete="new-password" required>
          </div>

          <label class="auth__checkbox auth__checkbox--block">
            <input type="checkbox" name="terms" required>
            <span>J'accepte les <a href="cgu.html" class="auth__link auth__link--bold">conditions d'utilisation</a> et les <a href="cgv.html" class="auth__link auth__link--bold">CGV</a></span>
          </label>

          <p class="auth__error" id="register-error" hidden></p>

          <button class="auth__btn" type="submit">Créer mon compte</button>
        </form>

        <p class="auth__footer">
          Déjà un compte ?
          <a href="connexion.html" class="auth__link auth__link--bold">Se connecter</a>
        </p>
      </div>
    </main>
  </div>

  <script src="js/user.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
