<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebooks — Les bons contacts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/ebooks.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body class="page-site" data-page="ebook">
  <main class="site-main">
    <div class="container ebooks">
      <div class="page-header">
        <span class="section-subtitle">Catalogue</span>
        <h1 class="section-title ebooks__title">Nos ebooks</h1>
        <p class="section-description ebooks__subtitle">Inscrivez-vous pour acheter et débloquer le téléchargement.</p>
        <p class="ebooks__total" id="ebooks-total"></p>
        <p class="ebooks__notice" id="ebooks-notice" hidden></p>
        <div class="ebooks__user" id="ebooks-user"></div>
      </div>

      <div class="ebooks-carousel-wrap" id="ebooks-carousel-wrap">
        <div class="ebooks-carousel" id="ebooks-carousel">
          <button type="button" class="ebooks-carousel__btn ebooks-carousel__btn--prev" id="ebooks-carousel-prev" aria-label="Ebook précédent">
            <i class="bi bi-chevron-left"></i>
          </button>
          <div class="ebooks-carousel__viewport" id="ebooks-carousel-viewport" tabindex="0">
            <div class="ebooks-carousel__track" id="ebooks-grid"></div>
          </div>
          <button type="button" class="ebooks-carousel__btn ebooks-carousel__btn--next" id="ebooks-carousel-next" aria-label="Ebook suivant">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
        <div class="ebooks-carousel__meta">
          <span class="ebooks-carousel__hint"><i class="bi bi-hand-index-thumb"></i> Molette, glisser ou flèches — une annuaire à la fois</span>
          <span class="ebooks-carousel__counter" id="ebooks-carousel-counter"></span>
        </div>
      </div>

      <p class="ebooks__empty" id="ebooks-empty" hidden>
        Aucun ebook pour le moment. Revenez bientôt !
      </p>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/user.js"></script>
  <script src="js/true-focus.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/ebooks-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ebooks-page.js"></script>
  <script src="js/cart-ui.js"></script>
</body>
</html>
