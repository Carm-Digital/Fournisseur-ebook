<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Les bons contacts</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="page-site" data-page="connexion">
  <main class="site-main">
    <div class="container auth">
      <div class="auth__card">
        <h1 class="auth__title">Connexion</h1>
        <p class="auth__subtitle">Accédez à votre espace Les bons contacts.</p>

        <form class="auth__form" id="login-form" novalidate>
          <div class="auth__field">
            <label class="auth__label" for="login-email">Adresse e-mail</label>
            <input class="auth__input" type="email" id="login-email" name="email" placeholder="vous@exemple.com" autocomplete="email" required>
          </div>

          <div class="auth__field">
            <label class="auth__label" for="login-password">Mot de passe</label>
            <input class="auth__input" type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>

          <div class="auth__row">
            <label class="auth__checkbox">
              <input type="checkbox" name="remember">
              <span>Se souvenir de moi</span>
            </label>
            <a href="#" class="auth__link" id="forgot-password-link">Mot de passe oublié ?</a>
          </div>

          <p class="auth__error" id="login-error" hidden></p>

          <button class="auth__btn" type="submit">Se connecter</button>
        </form>

        <p class="auth__footer">
          Pas encore de compte ?
          <a href="inscription.html" class="auth__link auth__link--bold">Créer un compte</a>
        </p>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/user.js"></script>
  <script src="js/true-focus.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart-ui.js"></script>
</body>
</html>
