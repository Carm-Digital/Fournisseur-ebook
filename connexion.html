<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Les bons contacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/cart.css">
  <link rel="stylesheet" href="css/legal.css">
</head>
<body class="page-auth">
  <div class="page">
    <header class="header">
      <a href="index.html" class="logo">
        <span class="logo__icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="12" fill="#E8341A"/>
            <path d="M7 16V8h2.2l2.3 4.5L14 8h2v8h-1.8v-4.8L12.2 16h-1.4L9 11.2V16H7z" fill="white"/>
          </svg>
        </span>
        <span class="logo__name">Les bons contacts</span>
      </a>

      <nav class="nav">
        <a href="ebook.html" class="nav__link">Ebook</a>
        <a href="connexion.html" class="nav__link nav__link--active">Connexion</a>
        <a href="inscription.html" class="nav__link">Inscription</a>
      </nav>
    </header>

    <main class="auth">
      <div class="auth__card">
        <h1 class="auth__title">Connexion</h1>
        <p class="auth__subtitle">Accédez à votre espace Les bons contacts.</p>

        <form class="auth__form" id="login-form" novalidate>
          <div class="auth__field">
            <label class="auth__label" for="login-email">Adresse e-mail</label>
            <input class="auth__input" type="email" id="login-email" name="email" placeholder="vous@exemple.com" autocomplete="email" required>
          </div>

          <div class="auth__field">
            <label class="auth__label" for="login-password">Mot de passe</label>
            <input class="auth__input" type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          </div>

          <div class="auth__row">
            <label class="auth__checkbox">
              <input type="checkbox" name="remember">
              <span>Se souvenir de moi</span>
            </label>
            <a href="#" class="auth__link">Mot de passe oublié ?</a>
          </div>

          <p class="auth__error" id="login-error" hidden></p>

          <button class="auth__btn" type="submit">Se connecter</button>
        </form>

        <p class="auth__footer">
          Pas encore de compte ?
          <a href="inscription.html" class="auth__link auth__link--bold">Créer un compte</a>
        </p>
      </div>
    </main>
  </div>

  <script src="js/user.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart-ui.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
